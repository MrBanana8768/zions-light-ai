version: "3.8"

services:
  zions-light-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zions-light-ai
    restart: unless-stopped

    # GPU access
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    ports:
      - "3000:3000"   # OpenWebUI (user-facing)
      - "8080:8080"   # context-compactor (OpenAI-compatible API)

    volumes:
      # Single persistent volume — holds model weights AND OpenWebUI state.
      # On RunPod, attach a Network Volume here; locally this is a bind mount.
      - ./data:/data

    env_file:
      - .env

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s

volumes:
  data:
