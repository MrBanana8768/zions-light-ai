[pytest]
# Per-suite pytest config. Lives in tests/integration/ so it only applies
# when running from that directory or pointing pytest at it explicitly —
# Tier-1 unit tests (compactor/test_*.py) are still plain scripts and
# don't use pytest at all.

markers =
    slow: tests that drive many real chat turns (5-15 min each). Skipped by default.

# Default: skip `slow` tests. Override with `-m slow` or `-m "slow or not slow"`.
addopts = -m "not slow" -ra --tb=short

# Force test discovery to only this directory even if pytest is run from repo root.
testpaths = .

# Don't try to collect doctest etc.; keep the test surface tight.
python_files = test_*.py
python_classes = Test*
python_functions = test_*
